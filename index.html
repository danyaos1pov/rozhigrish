<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ON1X PREMIUM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent; 
            /* Блокировка выделения текста для имитации приложения */
            -webkit-touch-callout: none; 
            -webkit-user-select: none;   
            user-select: none;
        }

        body {
            background: radial-gradient(circle at 0% 0%, #1e1e2f 0%, #0a0a0c 50%, #1a0b2e 100%);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px 20px;
            overflow: hidden;
            touch-action: manipulation; /* Запрет лишних жестов браузера */
        }

        body::before {
            content: "";
            position: absolute;
            width: 300px; height: 300px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            filter: blur(80px);
            border-radius: 50%;
            top: 10%; right: -50px;
            opacity: 0.4;
            z-index: 0;
        }

        .header { display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .logo { font-weight: 900; font-size: 22px; letter-spacing: 1px; color: #fff; }
        .status-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 10px #22c55e; margin-right: 8px; }
        .status-wrap { display: flex; align-items: center; font-size: 12px; font-weight: 700; color: #aaa; }

        .content { z-index: 10; margin-top: 40px; }
        .title { font-size: 38px; font-weight: 900; line-height: 1.1; margin-bottom: 10px; }
        .title span { background: linear-gradient(90deg, #6366f1, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .desc { font-size: 15px; color: rgba(255,255,255,0.6); line-height: 1.5; margin-bottom: 35px; }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .card-label { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .card-id { 
            font-size: 26px; 
            font-weight: 900; 
            color: #fff; 
            letter-spacing: 1px; 
            /* Разрешаем копировать только ID, если нужно */
            -webkit-user-select: text;
            user-select: text;
        }

        .footer { z-index: 10; margin-bottom: 10px; }

        .btn {
            width: 100%;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            color: #fff;
            border: none;
            padding: 22px;
            border-radius: 18px;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
            transition: 0.3s;
        }

        .btn:disabled {
            background: rgba(255, 255, 255, 0.05) !important;
            color: rgba(255, 255, 255, 0.2) !important;
            box-shadow: none !important;
            cursor: not-allowed !important;
        }

        .btn-success {
            background: rgba(34, 197, 94, 0.1) !important;
            color: #22c55e !important;
            border: 1px solid #22c55e !important;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">ON1X</div>
        <div class="status-wrap"><div class="status-dot"></div> <span id="status-txt">ОНЛАЙН</span></div>
    </div>

    <div class="content">
        <h1 class="title">ON1X VPN<br><span>РОЗЫГРЫШ</span></h1>
        <p class="desc">Подтверди свое участие в розыгрыше по кнопке ниже</p>
        <div class="glass-card">
            <div class="card-label">Твой цифровой ID</div>
            <div class="card-id" id="user-id">ОПРЕДЕЛЕНИЕ...</div>
        </div>
    </div>

    <div class="footer">
        <button class="btn" id="main-btn" disabled>ЗАГРУЗКА...</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Блокировка контекстного меню (правой кнопки мыши)
        document.addEventListener('contextmenu', e => e.preventDefault());

        // Конфигурация Supabase
        const SUPABASE_URL = 'https://yvnnngfzzjdbeiscwluy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2bm5uZ2Z6empkYmVpc2N3bHV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NzY2ODYsImV4cCI6MjA5MDA1MjY4Nn0.SesGG2QhbJKfAklZDiL8oolWQ6qaTtBwRL_tvigpd9A';
        
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const user = tg.initDataUnsafe?.user;
        const btn = document.getElementById('main-btn');
        const statusTxt = document.getElementById('status-txt');
        const userIdDisplay = document.getElementById('user-id');

        async function init() {
            if (!user || !user.id) {
                userIdDisplay.textContent = "НЕ ОПРЕДЕЛЕН";
                btn.textContent = "ОТКРОЙТЕ В ТЕЛЕГРАМ";
                btn.disabled = true;
                return;
            }

            userIdDisplay.textContent = user.id;
            btn.textContent = "УЧАСТВОВАТЬ";
            btn.disabled = false;

            try {
                // Проверка участия в таблице raffle
                const { data } = await sb
                    .from('raffle')
                    .select('telegram_id')
                    .eq('telegram_id', user.id.toString())
                    .maybeSingle();

                if (data) {
                    setAlreadyParticipant();
                }
            } catch (e) {
                console.warn("Ошибка проверки статуса:", e);
            }
        }

        function setAlreadyParticipant() {
            btn.textContent = "Уже участник";
            btn.classList.add('btn-success');
            btn.disabled = true;
            statusTxt.textContent = "ПОДТВЕРЖДЕН";
        }

        btn.onclick = async () => {
            if (!user) return;

            btn.disabled = true;
            btn.textContent = "ОБРАБОТКА...";
            
            // Запись данных в таблицу raffle
            const { error } = await sb.from('raffle').upsert({ 
                telegram_id: user.id.toString(), 
                first_name: user.first_name || '', 
                username: user.username || '' 
            }, { onConflict: 'telegram_id' });

            if (error) {
                tg.showAlert("Ошибка: " + error.message);
                btn.disabled = false;
                btn.textContent = "УЧАСТВОВАТЬ";
            } else {
                tg.showAlert("Вы успешно приняли участие в розыгрыше!");
                setAlreadyParticipant();
            }
        };

        init();
    </script>
</body>
</html>
