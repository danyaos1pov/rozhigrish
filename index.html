<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ON1X VPN — Розыгрыш</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            /* Твоя оригинальная темная тема */
            --bg-main: #0b0f17;
            --card-bg: #1e293b;
            --card-border: #000000;
            --shadow-color: #000000;
            --text-title: #ffffff;
            --text-body: #f8fafc;
            --text-sub: #94a3b8;
            
            --btn-primary-bg: #ccff00; /* Токсичный лайм */
            --btn-primary-text: #000000;
            --btn-secondary-bg: #0f172a;
            --btn-secondary-border: #000000;
            
            --slider-bg: #1e293b;
            --slider-thumb: #ccff00;
            --icon-color: #ffffff;
            
            --success-color: #22c55e;
        }

        [data-theme="light"] {
            /* Твоя оригинальная светлая тема */
            --bg-main: #f1f5f9;
            --card-bg: #ffffff;
            --card-border: #000000;
            --shadow-color: #000000;
            --text-title: #000000;
            --text-body: #0f172a;
            --text-sub: #64748b;
            
            --btn-primary-bg: #000000;
            --btn-primary-text: #ffffff;
            --btn-secondary-bg: #f8fafc;
            --btn-secondary-border: #000000;
            --slider-bg: #ffffff;
            --slider-thumb: #000000;
            --icon-color: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;   
            user-select: none;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-body);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 24px;
            transition: background 0.3s ease;
        }

        /* Переключатель темы с иконками */
        .theme-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-bottom: 40px;
        }

        .theme-switch {
            position: relative;
            width: 76px;
            height: 38px;
            background: var(--slider-bg);
            border: 2px solid var(--card-border);
            border-radius: 0px;
            box-shadow: 3px 3px 0px var(--shadow-color);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .theme-checkbox {
            display: none;
        }

        /* Иконки внутри ползунка */
        .switch-icon {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: var(--icon-color);
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            z-index: 1;
            transition: stroke 0.3s ease;
            margin: 0 4px;
        }

        /* Ручка переключателя */
        .theme-handle {
            position: absolute;
            left: 4px;
            width: 26px;
            height: 26px;
            background-color: var(--slider-thumb);
            border: 2px solid var(--card-border);
            transition: transform 0.2s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            z-index: 2;
        }

        .theme-checkbox:checked + .theme-switch .theme-handle {
            transform: translateX(38px);
        }

        /* Контейнер */
        .container {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        /* Шапка */
        .brand-header {
            text-align: center;
        }

        .brand-title {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: -1px;
            color: var(--text-title);
            text-transform: uppercase;
            -webkit-text-stroke: 1px var(--card-border);
        }

        .brand-slogan {
            display: inline-block;
            font-size: 12px;
            background: var(--btn-primary-bg);
            color: var(--btn-primary-text);
            border: 2px solid var(--card-border);
            padding: 2px 8px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 6px;
            box-shadow: 2px 2px 0px var(--shadow-color);
        }

        /* Главная секция карточки */
        .section-box {
            background: var(--card-bg);
            border: 3px solid var(--card-border);
            border-radius: 0px;
            padding: 28px 16px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            box-shadow: 8px 8px 0px var(--shadow-color);
            position: relative;
        }

        /* Текст по середине */
        .desc-text {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-body);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
            transition: color 0.3s ease;
        }

        .desc-text.success {
            color: var(--success-color) !important;
        }

        /* Дату завершения по середине */
        .date-badge {
            font-size: 12px;
            font-weight: 800;
            color: var(--card-border);
            background: #fff;
            border: 2px solid var(--card-border);
            padding: 6px 12px;
            align-self: center;
            box-shadow: 3px 3px 0px var(--shadow-color);
            text-transform: uppercase;
            text-align: center;
        }

        /* Брутальная кнопка Участвовать */
        .btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 16px 20px;
            font-size: 16px;
            font-weight: 800;
            text-decoration: none;
            border: 2px solid var(--card-border);
            position: relative;
            box-shadow: 4px 4px 0px var(--shadow-color);
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            cursor: pointer;
        }

        .btn-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn svg {
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .btn:not(:disabled):active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--shadow-color);
        }

        .btn-primary {
            background: var(--btn-primary-bg);
            color: var(--btn-primary-text);
        }

        .btn:disabled {
            background: var(--btn-secondary-bg) !important;
            color: var(--text-sub) !important;
            box-shadow: none !important;
            transform: translate(4px, 4px);
            cursor: not-allowed;
        }

        .btn.btn-success {
            border: 2px solid var(--success-color) !important;
            color: var(--success-color) !important;
            background: var(--btn-secondary-bg) !important;
            box-shadow: none !important;
            transform: translate(4px, 4px);
        }

        .arrow-icon {
            opacity: 0.9;
        }

        /* Кастомные брутальные всплывающие окна */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-window {
            background: var(--card-bg);
            border: 3px solid var(--card-border);
            padding: 24px 20px;
            width: 100%;
            max-width: 320px;
            box-shadow: 8px 8px 0px var(--shadow-color);
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transform: scale(0.9);
            transition: transform 0.2s ease;
        }

        .modal-overlay.active .modal-window {
            transform: scale(1);
        }

        .modal-title {
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .modal-value {
            font-size: 18px;
            font-weight: 900;
            color: var(--text-title);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="theme-container">
        <input type="checkbox" id="themeInput" class="theme-checkbox">
        <label for="themeInput" class="theme-switch">
            <svg class="switch-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            <div class="theme-handle"></div>
            <svg class="switch-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        </label>
    </div>

    <div class="container">
        
        <header class="brand-header">
            <h1 class="brand-title">ON1X VPN</h1>
            <p class="brand-slogan">Розыгрыш подписок</p>
        </header>

        <main class="section-box">
            <div class="desc-text">Подпишитесь на оба канала</div>

            <button class="btn btn-secondary" id="sub-btn-1" style="background: var(--btn-secondary-bg); color: var(--text-body); border-color: var(--btn-secondary-border);">
                <div class="btn-left">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                    <span>TOP ШМОТ</span>
                </div>
                <svg width="16" height="16" viewBox="0 0 24 24" class="arrow-icon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>

            <button class="btn btn-secondary" id="sub-btn-2" style="background: var(--btn-secondary-bg); color: var(--text-body); border-color: var(--btn-secondary-border);">
                <div class="btn-left">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                    <span>ON1X VPN</span>
                </div>
                <svg width="16" height="16" viewBox="0 0 24 24" class="arrow-icon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>

            <div class="desc-text" id="desc-txt">Примите участие</div>

            <button class="btn btn-primary" id="main-btn" disabled>
                <div class="btn-left">
                    <svg width="20" height="20" viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
                    <span id="btn-text">ЗАГРУЗКА...</span>
                </div>
                <svg width="16" height="16" viewBox="0 0 24 24" class="arrow-icon"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>
            
            <div class="date-badge">Завершение: 03.07.2026</div>
        </main>

    </div>

    <div class="modal-overlay" id="modal-success">
        <div class="modal-window" style="border-color: var(--success-color); box-shadow: 8px 8px 0px var(--success-color);">
            <div class="modal-title" style="color: var(--success-color);">Успешно!</div>
            <div class="modal-value">Вы приняли участие в розыгрыше!</div>
            <button class="btn" style="padding: 10px; font-size: 14px; justify-content: center; background: var(--success-color); color: #000; box-shadow: 3px 3px 0px #000; border-color: #000;" onclick="closeModal('modal-success')">ОТЛИЧНО</button>
        </div>
    </div>

    <script>
        // Логика смены тем
        const themeInput = document.getElementById('themeInput');
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            themeInput.checked = true;
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeInput.checked = false;
        }

        themeInput.addEventListener('change', () => {
            if (themeInput.checked) {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        });

        // Модальные окна
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        // Работа с Telegram и Supabase
        const tg = window.Telegram.WebApp;
        tg.expand();

        document.addEventListener('contextmenu', e => e.preventDefault());

        const SUPABASE_URL = 'https://yvnnngfzzjdbeiscwluy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2bm5uZ2Z6empkYmVpc2N3bHV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NzY2ODYsImV4cCI6MjA5MDA1MjY4Nn0.SesGG2QhbJKfAklZDiL8oolWQ6qaTtBwRL_tvigpd9A';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // Кнопки подписки на каналы
        document.getElementById('sub-btn-1').onclick = () => {
            tg.openTelegramLink('https://t.me/TOPshmot1337');
        };
        document.getElementById('sub-btn-2').onclick = () => {
            tg.openTelegramLink('https://t.me/ON1Xvpn');
        };

        const user = tg.initDataUnsafe?.user;
        const btn = document.getElementById('main-btn');
        const btnText = document.getElementById('btn-text');
        const descTxt = document.getElementById('desc-txt');

        async function init() {
            if (!user || !user.id) {
                btnText.textContent = "ОТКРОЙТЕ В ТЕЛЕГРАМ";
                btn.disabled = true;
                return;
            }

            btnText.textContent = "Участвовать";
            btn.disabled = false;

            try {
                const { data } = await sb
                    .from('raffle')
                    .select('telegram_id')
                    .eq('telegram_id', user.id.toString())
                    .maybeSingle();

                if (data) {
                    setAlreadyParticipant();
                }
            } catch (e) {
                console.warn("Ошибка проверки статуса:", e);
            }
        }

        function setAlreadyParticipant() {
            btnText.textContent = "Вы уже участник";
            btn.classList.add('btn-success');
            btn.disabled = true;
            
            descTxt.textContent = "Вы участвуете!";
            descTxt.classList.add('success');
        }

        btn.onclick = async () => {
            if (!user) return;
            btn.disabled = true;
            btnText.textContent = "Записываю..";
            
            const { error } = await sb.from('raffle').upsert({ 
                telegram_id: user.id.toString(), 
                first_name: user.first_name || '', 
                username: user.username || '' 
            }, { onConflict: 'telegram_id' });

            if (error) {
                tg.showAlert("Ошибка: " + error.message);
                btn.disabled = false;
                btnText.textContent = "Участвовать";
            } else {
                openModal('modal-success');
                setAlreadyParticipant();
            }
        };

        init();
    </script>
</body>
</html>
